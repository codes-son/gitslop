openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: memes
    description: Meme gallery operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /memes:
    get:
      operationId: listMemes
      tags: [memes]
      summary: List memes
      description: Returns all memes posted by the GitSlop bot, newest first
      parameters:
        - name: limit
          in: query
          schema:
            type: number
            default: 50
        - name: offset
          in: query
          schema:
            type: number
            default: 0
      responses:
        "200":
          description: List of meme posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeListResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MemePost:
      type: object
      properties:
        id:
          type: number
        keyword:
          type: string
        videoUrl:
          type: string
        imagePrompt:
          type: string
        githubUrl:
          type: string
        owner:
          type: string
        repo:
          type: string
        issueNumber:
          type: number
        createdAt:
          type: string
      required:
        - id
        - keyword
        - videoUrl
        - githubUrl
        - owner
        - repo
        - issueNumber
        - createdAt
    MemeListResponse:
      type: object
      properties:
        memes:
          type: array
          items:
            $ref: "#/components/schemas/MemePost"
        total:
          type: number
      required:
        - memes
        - total
